<div class="demo-shell">
  @if (sidenavMode() === 'drawer' && !drawerOpen()) {
    <button
      type="button"
      class="demo-shell__hamburger"
      aria-label="Open conversations"
      [attr.aria-expanded]="drawerOpen()"
      (click)="toggleSidenav()"
    >☰</button>
  }

  <chat-sidenav
    [threads]="visibleThreads()"
    [archivedThreads]="threadsSvc.archivedThreads()"
    [projects]="projectsSvc.projects()"
    [selectedProjectId]="selectedProjectId()"
    [projectActions]="projectActions"
    [activeThreadId]="threadIdSignal() ?? ''"
    [mode]="sidenavMode()"
    [agent]="agent"
    [debug]="true"
    [(open)]="drawerOpen"
    [actions]="threadActions"
    (newChat)="onNewThread()"
    (threadSelected)="onThreadSelected($event)"
    (projectSelected)="onProjectSelected($event)"
    (newProjectRequested)="onNewProjectClicked()"
    (searchOpened)="paletteOpen.set(true)"
    (openChange)="onSidenavOpenChange($event)"
    (modeChange)="onSidenavModeChange($event)"
    (replayRequested)="onTimelineReplay($event)"
    (forkRequested)="onTimelineFork($event)"
  >
    <button
      sidenavFooterRight
      type="button"
      class="demo-shell__theme-toggle"
      [attr.aria-label]="colorScheme() === 'dark' ? 'Switch to light theme' : 'Switch to dark theme'"
      (click)="onColorSchemeChange(colorScheme() === 'dark' ? 'light' : 'dark')"
    >
      @if (colorScheme() === 'dark') {
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/>
          <line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      } @else {
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      }
    </button>
  </chat-sidenav>

  <div
    class="demo-shell__main"
    [attr.data-sidenav-mode]="sidenavMode() !== 'drawer' ? sidenavMode() : null"
  >
    <div class="demo-shell__toolbar" role="toolbar" aria-label="Demo controls">
      <div class="demo-shell__segmented" aria-label="Mode">
        @for (option of modeOptions; track option.value) {
          <button
            type="button"
            class="demo-shell__segmented-button"
            [class.is-active]="mode() === option.value"
            [attr.aria-pressed]="mode() === option.value"
            (click)="onModeChange(option.value)"
          >{{ option.label }}</button>
        }
      </div>

      <div class="demo-shell__field demo-shell__field--first" data-field="model">
        <chat-select
          [options]="modelOptions()"
          [value]="model()"
          menuLabel="Model"
          (valueChange)="onModelChange($event)"
        />
      </div>

      <div class="demo-shell__field" data-field="effort">
        <chat-select
          [options]="effortOptions()"
          [value]="effort()"
          menuLabel="Effort"
          (valueChange)="onEffortChange($event)"
        />
      </div>

      <div class="demo-shell__field" data-field="genui">
        <chat-select
          [options]="genUiOptions()"
          [value]="genUiMode()"
          menuLabel="Gen UI"
          (valueChange)="onGenUiModeChange($event)"
        />
      </div>

      <div class="demo-shell__field" data-field="theme">
        <chat-select
          [options]="themeOptions()"
          [value]="theme()"
          menuLabel="Theme"
          (valueChange)="onThemeChange($event)"
        />
      </div>
    </div>

    <router-outlet />
    @if (agent.interrupt && agent.interrupt()) {
      <div class="demo-shell__interrupt-panel" role="region" aria-label="Approval required">
        <chat-interrupt-panel [agent]="agent" (action)="onInterruptAction($event)" />
      </div>
    }
    @if (agent.subagents && agent.subagents().size > 0) {
      <div class="demo-shell__subagents" role="region" aria-label="Active subagents">
        <chat-subagents [agent]="agent" />
      </div>
    }
  </div>

  <chat-history-search-palette
    [(open)]="paletteOpen"
    [(query)]="searchQuery"
    [results]="searchResults()"
    (threadSelected)="onSearchSelect($event)"
    (closed)="paletteOpen.set(false)"
  />
</div>
