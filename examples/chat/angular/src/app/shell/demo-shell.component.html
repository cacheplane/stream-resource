<div class="demo-shell">
  <router-outlet />

  <app-control-palette
    [mode]="mode()"
    [model]="model()"
    [modelOptions]="modelOptions()"
    [effort]="effort()"
    [effortOptions]="effortOptions()"
    [genUiMode]="genUiMode()"
    [genUiOptions]="genUiOptions()"
    [theme]="theme()"
    [themeOptions]="themeOptions()"
    [debugOpen]="debugOpen()"
    (modeChange)="onModeChange($event)"
    (modelChange)="onModelChange($event)"
    (effortChange)="onEffortChange($event)"
    (genUiModeChange)="onGenUiModeChange($event)"
    (themeChange)="onThemeChange($event)"
    (debugOpenChange)="onDebugChange($event)"
    (newConversation)="onNewConversation()"
  />

  @if (agent.interrupt && agent.interrupt()) {
    <div class="demo-shell__interrupt-panel" role="region" aria-label="Approval required">
      <chat-interrupt-panel [agent]="agent" (action)="onInterruptAction($event)" />
    </div>
  }

  @if (agent.subagents && agent.subagents().size > 0) {
    <div class="demo-shell__subagents" role="region" aria-label="Active subagents">
      <chat-subagents [agent]="agent" />
    </div>
  }

  @if (debugOpen()) {
    <div class="demo-shell__debug" role="region" aria-label="Debug overlay">
      <chat-debug [agent]="agent" />
    </div>
  }
</div>
