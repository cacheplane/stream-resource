<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" width="1200" height="480">
  <rect width="1200" height="480" fill="#080B14"/>

  <!-- Title -->
  <text x="600" y="48" text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="20" font-style="italic" fill="#8B96C8" opacity="0.9">
    Architecture
  </text>

  <!-- Box 1: Angular Component (x=60) -->
  <rect x="60" y="100" width="210" height="90" rx="6"
    fill="rgba(108,142,255,0.06)" stroke="rgba(108,142,255,0.25)" stroke-width="1"/>
  <text x="165" y="138" text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="15" font-weight="700" fill="#EEF1FF">Angular Component</text>
  <text x="165" y="158" text-anchor="middle"
    font-family="'Courier New', monospace"
    font-size="11" fill="#4A527A">template / signals</text>
  <text x="165" y="175" text-anchor="middle"
    font-family="'Courier New', monospace"
    font-size="11" fill="#4A527A">submit() / stop()</text>

  <!-- Arrow 1 → 2 -->
  <line x1="270" y1="145" x2="330" y2="145" stroke="#6C8EFF" stroke-width="1.5" stroke-opacity="0.7"/>
  <polygon points="330,140 342,145 330,150" fill="#6C8EFF" opacity="0.7"/>

  <!-- Box 2: agent() (x=342) -->
  <rect x="342" y="100" width="210" height="90" rx="6"
    fill="rgba(108,142,255,0.08)" stroke="rgba(108,142,255,0.45)" stroke-width="1.5"/>
  <text x="447" y="138" text-anchor="middle"
    font-family="'Courier New', monospace"
    font-size="15" font-weight="700" fill="#6C8EFF">agent()</text>
  <text x="447" y="158" text-anchor="middle"
    font-family="'Courier New', monospace"
    font-size="11" fill="#4A527A">Signal-native state</text>
  <text x="447" y="175" text-anchor="middle"
    font-family="'Courier New', monospace"
    font-size="11" fill="#4A527A">@cacheplane/angular</text>

  <!-- Arrow 2 → 3 -->
  <line x1="552" y1="145" x2="612" y2="145" stroke="#6C8EFF" stroke-width="1.5" stroke-opacity="0.7"/>
  <polygon points="612,140 624,145 612,150" fill="#6C8EFF" opacity="0.7"/>

  <!-- Box 3: StreamManager Bridge (x=624) -->
  <rect x="624" y="100" width="210" height="90" rx="6"
    fill="rgba(108,142,255,0.06)" stroke="rgba(108,142,255,0.25)" stroke-width="1"/>
  <text x="729" y="133" text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="14" font-weight="700" fill="#EEF1FF">StreamManager</text>
  <text x="729" y="153" text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="14" font-weight="700" fill="#EEF1FF">Bridge</text>
  <text x="729" y="175" text-anchor="middle"
    font-family="'Courier New', monospace"
    font-size="11" fill="#4A527A">stream-manager.bridge.ts</text>

  <!-- Arrow 3 → 4 -->
  <line x1="834" y1="145" x2="894" y2="145" stroke="#6C8EFF" stroke-width="1.5" stroke-opacity="0.7"/>
  <polygon points="894,140 906,145 894,150" fill="#6C8EFF" opacity="0.7"/>

  <!-- Box 4: LangGraph Platform (x=906) -->
  <rect x="906" y="100" width="234" height="90" rx="6"
    fill="rgba(108,142,255,0.06)" stroke="rgba(108,142,255,0.25)" stroke-width="1"/>
  <text x="1023" y="138" text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="15" font-weight="700" fill="#EEF1FF">LangGraph Platform</text>
  <text x="1023" y="158" text-anchor="middle"
    font-family="'Courier New', monospace"
    font-size="11" fill="#4A527A">LangGraph Cloud /</text>
  <text x="1023" y="175" text-anchor="middle"
    font-family="'Courier New', monospace"
    font-size="11" fill="#4A527A">Self-hosted Server</text>

  <!-- Return arrow: LangGraph → Bridge (below, reversed) -->
  <line x1="906" y1="218" x2="652" y2="218" stroke="#6C8EFF" stroke-width="1" stroke-opacity="0.4" stroke-dasharray="5,4"/>
  <polygon points="652,213 640,218 652,223" fill="#6C8EFF" opacity="0.4"/>
  <text x="779" y="236" text-anchor="middle"
    font-family="'Courier New', monospace"
    font-size="11" fill="#4A527A" opacity="0.8">SSE / stream events</text>

  <!-- Return arrow: Bridge → agent() (below) -->
  <line x1="624" y1="256" x2="470" y2="256" stroke="#6C8EFF" stroke-width="1" stroke-opacity="0.4" stroke-dasharray="5,4"/>
  <polygon points="470,251 458,256 470,261" fill="#6C8EFF" opacity="0.4"/>
  <text x="547" y="274" text-anchor="middle"
    font-family="'Courier New', monospace"
    font-size="11" fill="#4A527A" opacity="0.8">Signal updates</text>

  <!-- Return arrow: agent() → Component (below) -->
  <line x1="342" y1="294" x2="188" y2="294" stroke="#6C8EFF" stroke-width="1" stroke-opacity="0.4" stroke-dasharray="5,4"/>
  <polygon points="188,289 176,294 188,299" fill="#6C8EFF" opacity="0.4"/>
  <text x="265" y="312" text-anchor="middle"
    font-family="'Courier New', monospace"
    font-size="11" fill="#4A527A" opacity="0.8">Angular Signals</text>

  <!-- Transport label (below bridge) -->
  <text x="729" y="340" text-anchor="middle"
    font-family="'Courier New', monospace"
    font-size="11" fill="#4A527A" opacity="0.7">FetchStreamTransport | MockAgentTransport</text>

  <!-- Bottom rule -->
  <line x1="60" y1="380" x2="1140" y2="380" stroke="#6C8EFF" stroke-width="1" stroke-opacity="0.12"/>

  <!-- Legend -->
  <line x1="360" y1="410" x2="400" y2="410" stroke="#6C8EFF" stroke-width="1.5" stroke-opacity="0.7"/>
  <text x="410" y="415" font-family="'Courier New', monospace" font-size="11" fill="#4A527A">call / dispatch</text>
  <line x1="560" y1="410" x2="600" y2="410" stroke="#6C8EFF" stroke-width="1" stroke-opacity="0.4" stroke-dasharray="5,4"/>
  <text x="610" y="415" font-family="'Courier New', monospace" font-size="11" fill="#4A527A">reactive update</text>
</svg>
